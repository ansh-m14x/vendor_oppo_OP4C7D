name: Fetch and Extract Proprietary Blobs

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  prepare-vendor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository Layout
        uses: actions/checkout@v4
        # Removed the manual token requirement here to prevent the checkout error!

      - name: Download Blobs from GitHub Release
        run: |
          echo "[+] Downloading proprietary vendor zip archive..."
          curl -L -o vendor_tree.zip "https://github.com/stanlysilas/OppoA31-OP4C7D-vendor-tree/releases/download/vendor-tree/vendor_tree.zip"

          echo "[+] Unzipping archive layout..."
          unzip -q vendor_tree.zip

          echo "[+] Extracting everything (Makefiles + Blobs) to repository root..."
          if [ -d "vendor/oppo/OP4C7D" ]; then
            # This copies everything inside the zip's nested target folder directly into your root
            cp -r vendor/oppo/OP4C7D/* .
            echo "[SUCCESS] Main tree structures and blobs copied over seamlessly."
          else
            echo "[ERROR] ZIP path target structure structure matching failed!" && exit 1
          fi

          echo "[+] Cleaning up workspace archive scraps..."
          rm -rf vendor/
          rm vendor_tree.zip

      - name: Commit and Push to Repository
        run: |
          git config --global user.name "ansh-m14x"
          git config --global user.email "ansh-m14x@users.noreply.github.com"
          
          # Stage all files, including hidden items and untracked folders
          git add -A
          
          if git diff --cached --quiet; then
            echo "No changes found to update."
          else
            git commit -m "OP4C7D: Populate complete vendor tree makefiles and blobs from source"
            # Using the default system token explicitly for the push action
            git push "https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" main
          fi
