name: Fetch and Extract Proprietary Blobs

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  prepare-vendor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Vendor Tree Makefiles
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.VENDOR_PUSH_TOKEN }} # Uses a repository secret for authorization

      - name: Download Blobs from GitHub Release
        run: |
          echo "[+] Downloading proprietary blobs..."
          curl -L -o vendor_tree.zip "https://github.com/stanlysilas/OppoA31-OP4C7D-vendor-tree/releases/download/vendor-tree/vendor_tree.zip"

          echo "[+] Extracting nested archive layout..."
          unzip -q vendor_tree.zip

          echo "[+] Moving proprietary files to the repository root..."
          if [ -d "vendor/oppo/OP4C7D/proprietary" ]; then
            mv vendor/oppo/OP4C7D/proprietary .
            echo "[SUCCESS] Proprietary folder shifted to workspace root."
          else
            echo "[ERROR] Expected zip structure was missing!" && exit 1
          fi

          echo "[+] Cleaning up directory structure scraps..."
          rm -rf vendor/
          rm vendor_tree.zip

      - name: Commit and Push Blobs back to Repo
        run: |
          git config --global user.name "ansh-m14x"
          git config --global user.email "ansh-m14x@users.noreply.github.com"
          
          # Force add files even if they are in .gitignore
          git add -f proprietary/
          
          # Only commit if changes exist
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "OP4C7D: Automatically populate proprietary blobs via workflow"
            git push origin main
          fi
